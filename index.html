<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mux1r · Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .bg-layer { position: fixed; inset: 0; z-index: 0; opacity: 0; pointer-events: none; }

  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: #0f0c29;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px;
    transition: opacity 0.7s ease, visibility 0.7s ease;
  }
  #intro.gone { opacity: 0; visibility: hidden; pointer-events: none; }
  .intro-logo {
    font-size: 3rem; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: pulse 1.2s ease infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  .intro-bar { width: 160px; height: 2px; border-radius: 1px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .intro-bar::after {
    content: ''; display: block; height: 100%;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    animation: barfill 1s ease forwards;
  }
  @keyframes barfill { from { width: 0; } to { width: 100%; } }

  body {
    height: 100vh; display: flex; flex-direction: column;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: #e2e8f0; overflow: hidden;
  }

  /* ── Profile ── */
  .profile {
    display: flex; align-items: center; gap: 18px;
    padding: 13px 28px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03); backdrop-filter: blur(24px);
    position: relative; z-index: 2;
    animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.8s both;
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:none; } }

  .avatar { width: 46px; height: 46px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); flex-shrink:0; }
  .profile-info h1 {
    font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { font-size: 0.67rem; color: rgba(226,232,240,0.32); margin-top: 2px; }

  .github-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.11);
    color: rgba(226,232,240,0.68); text-decoration: none; font-size: 0.73rem;
    transition: background 0.2s; flex-shrink: 0;
  }
  .github-link:hover { background: rgba(255,255,255,0.12); }

  .stats-grid { display: flex; gap: 8px; }
  .stat-box {
    text-align: center; padding: 5px 11px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  }
  .stat-box .num { display: block; font-size: 0.88rem; font-weight: 700; color: #c4b5fd; }
  .stat-box .lbl { display: block; font-size: 0.57rem; color: rgba(226,232,240,0.27); margin-top: 1px; }

  .search-wrap { position: relative; margin-left: auto; width: 175px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.28; pointer-events: none; }
  #search {
    width: 100%; padding: 7px 11px 7px 31px;
    border-radius: 9px; border: 1px solid rgba(255,255,255,0.11);
    background: rgba(255,255,255,0.06); color: #e2e8f0; font-size: 0.77rem; outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(167,139,250,0.4); }
  #search::placeholder { color: rgba(226,232,240,0.22); }

  /* ── Grid ── */
  .grid-area {
    flex: 1; overflow-y: auto; position: relative; z-index: 1;
    padding: 16px 20px 24px;
  }
  .grid-area::-webkit-scrollbar { width: 4px; }
  .grid-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .repo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
  }

  /* wrapper absorbs overflow so scaled card never overlaps neighbour */
  .card-wrap {
    padding: 8px;
    position: relative;
    /* z-index set by JS based on scale */
  }

  .repo-card {
    border-radius: 14px; overflow: hidden;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transform: scale(var(--scale, 1));
    transform-origin: center center;
    transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1),
                border-color 0.35s ease,
                box-shadow 0.35s ease;
    display: flex; flex-direction: column;
    animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    will-change: transform;
  }
  @keyframes fadeUp { from { opacity:0; } to { opacity:1; } }

  /* icon area */
  .card-icon {
    height: 84px; position: relative; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-icon::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.22));
    pointer-events: none;
  }
  .card-ini {
    font-size: 1.45rem; font-weight: 800; letter-spacing: -0.03em;
    color: rgba(255,255,255,0.9); text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    user-select: none;
  }
  .card-favicon {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; padding: 18px; z-index: 1;
  }

  /* body */
  .card-body {
    padding: 10px 12px 11px;
    background: rgba(0,0,0,0.14);
    display: flex; flex-direction: column; gap: 5px; flex: 1;
  }
  .card-name {
    font-size: 0.78rem; font-weight: 600; color: rgba(226,232,240,0.87);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-desc {
    font-size: 0.7rem; color: rgba(226,232,240,0.38); line-height: 1.42;
    display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden; min-height: 2em;
  }
  .card-footer {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 0.65rem; color: rgba(226,232,240,0.32);
    margin-top: auto; padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .card-footer span { display: flex; align-items: center; gap: 3px; }
  .lang-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .btn-live {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 0;
    background: linear-gradient(135deg, rgba(96,165,250,0.15), rgba(167,139,250,0.15));
    border-top: 1px solid rgba(96,165,250,0.2);
    color: rgba(147,197,253,0.88); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.03em;
    text-decoration: none;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-live:hover { background: linear-gradient(135deg, rgba(96,165,250,0.28), rgba(167,139,250,0.28)); }

  #empty {
    grid-column: 1/-1; text-align: center;
    color: rgba(226,232,240,0.22); padding: 80px 0; font-size: 0.88rem;
  }
</style>
</head>
<body>

<div class="bg-layer" id="bg-a"></div>
<div class="bg-layer" id="bg-b"></div>

<div id="intro">
  <div class="intro-logo">Mux1r</div>
  <div class="intro-bar"></div>
</div>

<header class="profile">
  <img class="avatar" src="https://github.com/Mux1r.png" alt="Mux1r">
  <div class="profile-info">
    <h1>Mux1r</h1>
    <p class="subtitle">GitHub Projects</p>
  </div>
  <a class="github-link" href="https://github.com/Mux1r" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
    github.com/Mux1r
  </a>
  <div class="stats-grid" id="stats">
    <div class="stat-box"><span class="num">—</span><span class="lbl">Repos</span></div>
    <div class="stat-box"><span class="num">—</span><span class="lbl">Stars</span></div>
    <div class="stat-box"><span class="num">—</span><span class="lbl">Forks</span></div>
  </div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="搜尋 repo...">
  </div>
</header>

<div class="grid-area" id="grid-area">
  <div class="repo-grid" id="grid"></div>
</div>

<script>
function repoColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) % 360;
  return `hsl(${h},65%,62%)`;
}
function repoGradient(name) {
  const h = [...name].reduce((a,c)=>(a*31+c.charCodeAt(0))%360, 0);
  return `radial-gradient(ellipse at top left, hsl(${h} 70% 16%) 0%, hsl(${(h+120)%360} 60% 11%) 50%, hsl(${(h+240)%360} 65% 14%) 100%)`;
}
function initials(name) {
  return name.replace(/[-_]/g,' ').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || name[0].toUpperCase();
}

// bg crossfade
const layers = [document.getElementById('bg-a'), document.getElementById('bg-b')];
let active = 0, clearTimer;
function setBg(name) {
  clearTimeout(clearTimer);
  const next = 1 - active;
  layers[next].style.background = repoGradient(name);
  layers[next].style.transition = 'opacity 0.7s cubic-bezier(0.4,0,0.2,1)';
  layers[active].style.transition = 'opacity 0.7s cubic-bezier(0.4,0,0.2,1)';
  layers[next].style.opacity = '1';
  layers[active].style.opacity = '0';
  active = next;
}
function clearBg() {
  clearTimer = setTimeout(() => {
    layers[active].style.transition = 'opacity 0.5s cubic-bezier(0.4,0,0.2,1)';
    layers[active].style.opacity = '0';
  }, 120);
}

// 2D magnification
const RANGE = 200, MAX_SCALE = 1.18;
let cardEls = [], repoList = [], rafId = null;

function updateMagnify(mx, my) {
  let topScale = 0, topName = null;
  cardEls.forEach((el, i) => {
    const r = el.getBoundingClientRect();
    const d = Math.hypot(mx - (r.left+r.width/2), my - (r.top+r.height/2));
    const s = d < RANGE ? 1 + (MAX_SCALE-1)*((Math.cos(d/RANGE*Math.PI)+1)/2) : 1;
    el.style.setProperty('--scale', s.toFixed(3));
    // elevate card-wrap so magnified card is on top
    el.parentElement.style.zIndex = s > 1.01 ? Math.round(s * 100) : '';
    // track which repo is closest
    if (s > topScale) { topScale = s; topName = repoList[i]?.name; }
  });
  if (topName) setBg(topName);
}

function resetMagnify() {
  cardEls.forEach(el => {
    el.style.setProperty('--scale', '1');
    el.parentElement.style.zIndex = '';
  });
}

// card template
function card(r, i) {
  const color = repoColor(r.name);
  const dark  = `color-mix(in srgb,${color} 50%,#000)`;
  const ini   = initials(r.name);
  const faviconTag = r.has_pages
    ? `<img class="card-favicon" src="https://Mux1r.github.io/${r.name}/favicon.ico" onerror="this.remove()" loading="lazy">`
    : '';
  return `
  <div class="card-wrap" style="animation-delay:${i*0.025}s">
    <div class="repo-card" data-name="${r.name}" onclick="window.open('${r.html_url}','_blank')">
      <div class="card-icon" style="background:linear-gradient(145deg,${color},${dark})">
        <span class="card-ini">${ini}</span>
        ${faviconTag}
      </div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-desc">${r.description || '<em style="opacity:.28">暫無描述</em>'}</div>
        <div class="card-footer">
          ${r.language ? `<span><span class="lang-dot" style="background:${color}"></span>${r.language}</span>` : ''}
          <span>
            <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            ${r.stargazers_count}
          </span>
        </div>
      </div>
      ${r.has_pages ? `<a class="btn-live" href="https://Mux1r.github.io/${r.name}/" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10z"/></svg>
        View Live Site
      </a>` : ''}
    </div>
  </div>`;
}

function render(list) {
  repoList = list;
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div id="empty">找不到符合的 repo</div>'; cardEls = []; return; }
  grid.innerHTML = list.map((r,i) => card(r,i)).join('');
  cardEls = [...grid.querySelectorAll('.repo-card')];
}

// mousemove on grid area (RAF throttled)
document.getElementById('grid-area').addEventListener('mousemove', e => {
  if (rafId) return;
  rafId = requestAnimationFrame(() => {
    updateMagnify(e.clientX, e.clientY);
    rafId = null;
  });
});
document.getElementById('grid-area').addEventListener('mouseleave', () => {
  cancelAnimationFrame(rafId); rafId = null;
  resetMagnify();
  clearBg();
});

// load
let repos = [];
async function load() {
  try {
    const res = await fetch('https://api.github.com/users/Mux1r/repos?per_page=100&sort=updated');
    repos = (await res.json()).filter(r => r.name !== 'Mux1r.github.io');
    document.getElementById('stats').innerHTML = `
      <div class="stat-box"><span class="num">${repos.length}</span><span class="lbl">Repos</span></div>
      <div class="stat-box"><span class="num">${repos.reduce((s,r)=>s+r.stargazers_count,0)}</span><span class="lbl">Stars</span></div>
      <div class="stat-box"><span class="num">${repos.reduce((s,r)=>s+r.forks_count,0)}</span><span class="lbl">Forks</span></div>`;
    render(repos);
    setTimeout(() => document.getElementById('intro').classList.add('gone'), 200);
  } catch {
    document.getElementById('grid').innerHTML = '<div id="empty">無法載入</div>';
    document.getElementById('intro').classList.add('gone');
  }
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  render(q ? repos.filter(r =>
    r.name.toLowerCase().includes(q) ||
    (r.description||'').toLowerCase().includes(q) ||
    (r.language||'').toLowerCase().includes(q)
  ) : repos);
});

load();
</script>
</body>
</html>
