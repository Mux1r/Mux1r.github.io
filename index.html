<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mux1r · Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .bg-layer { position: fixed; inset: 0; z-index: 0; opacity: 0; pointer-events: none; }

  #intro {
    position: fixed; inset: 0; z-index: 100;
    background: #0f0c29;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px;
    transition: opacity 0.7s ease, visibility 0.7s ease;
  }
  #intro.gone { opacity: 0; visibility: hidden; pointer-events: none; }
  .intro-logo {
    font-size: 3rem; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: pulse 1.2s ease infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
  .intro-bar { width: 160px; height: 2px; border-radius: 1px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .intro-bar::after {
    content: ''; display: block; height: 100%;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    animation: barfill 1s ease forwards;
  }
  @keyframes barfill { from { width: 0; } to { width: 100%; } }

  body {
    height: 100vh; display: flex; flex-direction: column;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: #e2e8f0; overflow: hidden;
  }

  /* ── Profile ── */
  .profile {
    display: flex; align-items: center; gap: 18px;
    padding: 14px 28px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03); backdrop-filter: blur(24px);
    position: relative; z-index: 2;
    animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) 0.8s both;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); flex-shrink: 0; }

  .profile-info h1 {
    font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { font-size: 0.68rem; color: rgba(226,232,240,0.34); margin-top: 2px; }

  .github-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 13px; border-radius: 999px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.11);
    color: rgba(226,232,240,0.68); text-decoration: none; font-size: 0.74rem;
    transition: background 0.2s; flex-shrink: 0;
  }
  .github-link:hover { background: rgba(255,255,255,0.12); }

  .stats-grid { display: flex; gap: 8px; }
  .stat-box {
    text-align: center; padding: 5px 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  }
  .stat-box .num { display: block; font-size: 0.9rem; font-weight: 700; color: #c4b5fd; }
  .stat-box .lbl { display: block; font-size: 0.58rem; color: rgba(226,232,240,0.28); margin-top: 1px; }

  .search-wrap { position: relative; margin-left: auto; width: 180px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none; }
  #search {
    width: 100%; padding: 7px 11px 7px 32px;
    border-radius: 9px; border: 1px solid rgba(255,255,255,0.11);
    background: rgba(255,255,255,0.06); color: #e2e8f0; font-size: 0.78rem; outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: rgba(167,139,250,0.4); }
  #search::placeholder { color: rgba(226,232,240,0.24); }

  /* ── Grid area ── */
  .grid-area {
    flex: 1; overflow-y: auto; position: relative; z-index: 1;
    padding: 20px 24px 32px;
    animation: fadeIn 0.5s ease 1s both;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .grid-area::-webkit-scrollbar { width: 5px; }
  .grid-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .repo-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }

  /* ── Repo card ── */
  .repo-card {
    border-radius: 16px; overflow: hidden;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    display: flex; flex-direction: column;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                border-color 0.3s ease,
                box-shadow 0.3s ease;
    animation: cardUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  .repo-card:hover {
    transform: translateY(-6px);
    border-color: color-mix(in srgb, var(--c) 50%, transparent);
    box-shadow: 0 14px 40px color-mix(in srgb, var(--c) 22%, transparent),
                0 0 0 1px color-mix(in srgb, var(--c) 18%, transparent);
  }
  @keyframes cardUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* icon area */
  .card-icon {
    height: 88px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }
  .card-icon::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,0.25));
  }

  /* body */
  .card-body {
    padding: 11px 13px 12px;
    display: flex; flex-direction: column; gap: 6px;
    flex: 1;
    background: rgba(0,0,0,0.15);
  }

  .card-name {
    font-size: 0.8rem; font-weight: 600; color: rgba(226,232,240,0.88);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 0.72rem; color: rgba(226,232,240,0.42);
    line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; min-height: 2.1em;
  }

  .card-footer {
    display: flex; align-items: center; gap: 9px;
    font-size: 0.68rem; color: rgba(226,232,240,0.35);
    margin-top: auto; padding-top: 7px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .card-footer span { display: flex; align-items: center; gap: 3px; }
  .lang-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .btn-live {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px;
    background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25);
    color: rgba(147,197,253,0.85); font-size: 0.65rem; font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-live:hover { background: rgba(96,165,250,0.22); }

  #empty {
    grid-column: 1/-1; text-align: center;
    color: rgba(226,232,240,0.25); padding: 80px 0; font-size: 0.88rem;
  }
</style>
</head>
<body>

<div class="bg-layer" id="bg-a"></div>
<div class="bg-layer" id="bg-b"></div>

<div id="intro">
  <div class="intro-logo">Mux1r</div>
  <div class="intro-bar"></div>
</div>

<header class="profile">
  <img class="avatar" src="https://github.com/Mux1r.png" alt="Mux1r">
  <div class="profile-info">
    <h1>Mux1r</h1>
    <p class="subtitle">GitHub Projects</p>
  </div>
  <a class="github-link" href="https://github.com/Mux1r" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
    github.com/Mux1r
  </a>
  <div class="stats-grid" id="stats">
    <div class="stat-box"><span class="num">—</span><span class="lbl">Repos</span></div>
    <div class="stat-box"><span class="num">—</span><span class="lbl">Stars</span></div>
    <div class="stat-box"><span class="num">—</span><span class="lbl">Forks</span></div>
  </div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="搜尋 repo...">
  </div>
</header>

<div class="grid-area">
  <div class="repo-grid" id="grid"></div>
</div>

<script>
function repoColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) % 360;
  return `hsl(${h},65%,62%)`;
}
function repoGradient(name) {
  const h = [...name].reduce((a,c) => (a*31+c.charCodeAt(0))%360, 0);
  return `radial-gradient(ellipse at top left, hsl(${h} 70% 16%) 0%, hsl(${(h+120)%360} 60% 11%) 50%, hsl(${(h+240)%360} 65% 14%) 100%)`;
}
function initials(name) {
  return name.replace(/[-_]/g,' ').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || name[0].toUpperCase();
}

// bg crossfade
const layers = [document.getElementById('bg-a'), document.getElementById('bg-b')];
let active = 0, clearTimer;
function setBg(name) {
  clearTimeout(clearTimer);
  const next = 1 - active;
  layers[next].style.background = repoGradient(name);
  layers[next].style.transition = 'opacity 0.7s cubic-bezier(0.4,0,0.2,1)';
  layers[active].style.transition = 'opacity 0.7s cubic-bezier(0.4,0,0.2,1)';
  layers[next].style.opacity = '1';
  layers[active].style.opacity = '0';
  active = next;
}
function clearBg() {
  clearTimer = setTimeout(() => {
    layers[active].style.transition = 'opacity 0.5s cubic-bezier(0.4,0,0.2,1)';
    layers[active].style.opacity = '0';
  }, 120);
}

let repos = [];

function card(r, i) {
  const color = repoColor(r.name);
  const ini   = initials(r.name);
  const dark  = `color-mix(in srgb,${color} 55%,#000)`;
  return `
  <div class="repo-card" style="--c:${color};animation-delay:${i*0.03}s"
    onclick="window.open('${r.html_url}','_blank')"
    onmouseenter="setBg('${r.name}')"
    onmouseleave="clearBg()">
    <div class="card-icon" style="background:linear-gradient(145deg,${color},${dark})">${ini}</div>
    <div class="card-body">
      <div class="card-name">${r.name}</div>
      <div class="card-desc">${r.description || '<em style="opacity:.3">暫無描述</em>'}</div>
      <div class="card-footer">
        ${r.language ? `<span><span class="lang-dot" style="background:${color}"></span>${r.language}</span>` : ''}
        <span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          ${r.stargazers_count}
        </span>
        ${r.has_pages ? `<a class="btn-live" href="https://Mux1r.github.io/${r.name}/" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10z"/></svg>
          Live
        </a>` : ''}
      </div>
    </div>
  </div>`;
}

function render(list) {
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div id="empty">找不到符合的 repo</div>'; return; }
  grid.innerHTML = list.map((r,i) => card(r,i)).join('');
}

async function load() {
  try {
    const res = await fetch('https://api.github.com/users/Mux1r/repos?per_page=100&sort=updated');
    repos = (await res.json()).filter(r => r.name !== 'Mux1r.github.io');
    document.getElementById('stats').innerHTML = `
      <div class="stat-box"><span class="num">${repos.length}</span><span class="lbl">Repos</span></div>
      <div class="stat-box"><span class="num">${repos.reduce((s,r)=>s+r.stargazers_count,0)}</span><span class="lbl">Stars</span></div>
      <div class="stat-box"><span class="num">${repos.reduce((s,r)=>s+r.forks_count,0)}</span><span class="lbl">Forks</span></div>`;
    render(repos);
    setTimeout(() => document.getElementById('intro').classList.add('gone'), 200);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div id="empty">無法載入</div>';
    document.getElementById('intro').classList.add('gone');
  }
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  render(q ? repos.filter(r =>
    r.name.toLowerCase().includes(q) ||
    (r.description||'').toLowerCase().includes(q) ||
    (r.language||'').toLowerCase().includes(q)
  ) : repos);
});

load();
</script>
</body>
</html>
